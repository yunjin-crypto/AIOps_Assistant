# ==========================================
# AIOps Assistant - Docker Compose
# ==========================================

services:
  # ---------- 后端 (FastAPI) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiops-backend
    ports:
      - "8000:8000"
    volumes:
      # 持久化 RAG 知识库数据
      - faiss_data:/data/faiss
      - docs_data:/data/docs
      - workflows_data:/data/workflows
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://62.234.79.74:3000
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------- 前端 (Next.js) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://62.234.79.74:8000
    container_name: aiops-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

# ---------- 命名卷 ----------
volumes:
  faiss_data:
  docs_data:
  workflows_data:
